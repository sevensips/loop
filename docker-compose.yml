services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: partyloop
      POSTGRES_PASSWORD: partyloop
      POSTGRES_DB: partyloop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partyloop -d partyloop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: partyloop
      MINIO_ROOT_PASSWORD: partyloop-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # веб-консоль (http://localhost:9001)
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://partyloop:partyloop@postgres:5432/partyloop
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me-in-production
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://192.168.1.106:9000
      S3_BUCKET: partyloop
      S3_ACCESS_KEY: partyloop
      S3_SECRET_KEY: partyloop-secret
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
